openapi: 3.0.3
info:
  title: Fidd Content API
  version: 1.0.0
  description: REST wrapper over FiddContentService

servers:
  - url: http://localhost:4199

tags:
  - name: messages

paths:
  /instances:
    get:
      operationId: getFiddIds
      tags: [messages]
      summary: Get all managed Fidd instance IDs
      responses:
        '200':
          description: List of Fidd IDs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        '500':
          $ref: '#/components/responses/InternalServerError'

          
  /api/v1/{fiddId}/messages/tail:
    get:
      operationId: getMessageNumbersTail
      tags: [messages]
      summary: Get latest N message numbers (descending)
      parameters:
        - $ref: '#/components/parameters/FiddId'
        - name: count
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
          description: Number of message numbers to return
      responses:
        '200':
          description: Message numbers in descending order
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: './schemas/MessageNumber.yaml'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/{fiddId}/messages/{messageNumber}/before:
    get:
      operationId: getMessageNumbersBefore
      tags: [messages]
      summary: Get N message numbers before a given message (descending)
      parameters:
        - $ref: '#/components/parameters/FiddId'
        - $ref: '#/components/parameters/MessageNumber'
        - name: count
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
        - name: inclusive
          in: query
          required: true
          schema:
            type: boolean
          description: Include the given messageNumber if true
      responses:
        '200':
          description: Message numbers in descending order
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: './schemas/MessageNumber.yaml'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/{fiddId}/messages/range:
    get:
      operationId: getMessageNumbersBetween
      tags: [messages]
      summary: Get N message numbers between two bounds (descending)
      description: Returns results in descending order. Use getLatest to select which side to favor when count is smaller than the range.
      parameters:
        - $ref: '#/components/parameters/FiddId'
        - name: latestMessage
          in: query
          required: true
          schema:
            $ref: './schemas/MessageNumber.yaml'
        - name: inclusiveLatest
          in: query
          required: true
          schema:
            type: boolean
        - name: earliestMessage
          in: query
          required: true
          schema:
            $ref: './schemas/MessageNumber.yaml'
        - name: inclusiveEarliest
          in: query
          required: true
          schema:
            type: boolean
        - name: count
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
        - name: getLatest
          in: query
          required: true
          schema:
            type: boolean
          description: If true, prefer newer messages when trimming to count
      responses:
        '200':
          description: Message numbers in descending order within the range
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: './schemas/MessageNumber.yaml'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/{fiddId}/messages/{messageNumber}/metadata:
    get:
      operationId: getFiddFileMetadata
      tags: [messages]
      summary: Get Fidd file metadata for a message
      parameters:
        - $ref: '#/components/parameters/FiddId'
        - $ref: '#/components/parameters/MessageNumber'
      responses:
        '200':
          description: Metadata found
          content:
            application/json:
              schema:
                $ref: './schemas/FiddFileMetadata.yaml'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/{fiddId}/messages/{messageNumber}/logical-files:
    get:
      operationId: getLogicalFileInfos
      tags: [messages]
      summary: List logical files for a message
      parameters:
        - $ref: '#/components/parameters/FiddId'
        - $ref: '#/components/parameters/MessageNumber'
      responses:
        '200':
          description: Logical files found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: './schemas/LogicalFileMetadata.yaml'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  parameters:
    FiddId:
      name: fiddId
      in: path
      required: true
      schema:
        type: string
      description: Name of the Fidd instance
    MessageNumber:
      name: messageNumber
      in: path
      required: true
      schema:
        $ref: './schemas/MessageNumber.yaml'

  responses:
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: './schemas/Error.yaml'
    BadRequestError:
      description: Invalid input
      content:
        application/json:
          schema:
            $ref: './schemas/Error.yaml'
    InternalServerError:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: './schemas/Error.yaml'

  schemas: {}
